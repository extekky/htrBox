---
- name: Deploy YC (frontend + backend + postgres)
  hosts: yc
  gather_facts: false
  vars:
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
    ghcr_owner: "{{ lookup('env', 'GHCR_OWNER') | default('extekky', true) | lower }}"
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    hysteria_auth: "{{ lookup('env', 'HYSTERIA_AUTH') }}"
    admin_username: "{{ lookup('env', 'ADMIN_USERNAME') }}"
    admin_password: "{{ lookup('env', 'ADMIN_PASSWORD') }}"
    cf_api_token: "{{ lookup('env', 'CF_API_TOKEN') }}"
    email: "{{ lookup('env', 'EMAIL') }}"
    certificate_domains:
      - "{{ service_domain }}"
      - "www.{{ service_domain }}"

  tasks:
    - name: Show YC deployment target
      debug:
        msg: "YC target={{ inventory_hostname }} host={{ ansible_host }} image_tag={{ image_tag }}"
      tags: [always]

    - name: Create YC application directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ secrets_dir }}"
      tags: [prepare, certbot, deploy]

    - name: Create YC Postgres data directory
      become: true
      file:
        path: "{{ data_dir }}/pgdata"
        state: directory
        mode: "0755"
      tags: [prepare, deploy]

    - name: Render YC environment file
      template:
        src: templates/infra.env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"
      tags: [env, deploy]

    - name: Render YC docker-compose.yaml
      template:
        src: templates/docker-compose.yc.yaml.j2
        dest: "{{ app_dir }}/docker-compose.yaml"
        mode: "0644"
      tags: [deploy]

    - name: Render YC Cloudflare credentials
      template:
        src: templates/cloudflare.ini.j2
        dest: "{{ secrets_dir }}/cloudflare-yc.ini"
        mode: "0600"
      tags: [certbot, deploy]

    - name: Check Docker on YC
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1; then
          docker --version
        else
          echo "docker_status=missing"
          exit 1
        fi
        systemctl is-active docker
      register: yc_docker
      changed_when: false
      tags: [prepare, status, deploy]

    - name: Print YC Docker status
      debug:
        var: yc_docker.stdout_lines
      when: yc_docker is defined
      tags: [prepare, status, deploy]

    - name: Check or issue YC certificate
      become: true
      shell: |
        set -e
        CERT_PATH="/etc/letsencrypt/live/{{ service_domain }}/fullchain.pem"
        RENEW=false

        if [ ! -f "$CERT_PATH" ]; then
          echo "certificate_status=missing"
          RENEW=true
        else
          EXPIRY="$(openssl x509 -enddate -noout -in "$CERT_PATH" | cut -d= -f2)"
          DAYS=$(( ($(date -d "$EXPIRY" +%s) - $(date +%s)) / 86400 ))
          echo "certificate_status=present"
          echo "certificate_days_left=$DAYS"
          [ "$DAYS" -lt 30 ] && RENEW=true
        fi

        if [ "$RENEW" = true ]; then
          echo "certificate_action=issue"
          apt-get update -qq
          apt-get install -y -qq certbot python3-certbot-dns-cloudflare
          certbot certonly \
            --dns-cloudflare \
            --dns-cloudflare-credentials {{ secrets_dir }}/cloudflare-yc.ini \
            {% for cert_domain in certificate_domains %}
            -d {{ cert_domain }} \
            {% endfor %}
            --email {{ email }} \
            --agree-tos --no-eff-email --non-interactive
        else
          echo "certificate_action=skip"
        fi
      register: yc_certbot
      changed_when: "'certificate_action=issue' in yc_certbot.stdout"
      tags: [certbot, deploy]

    - name: Show YC certificate result
      debug:
        var: yc_certbot.stdout_lines
      when: yc_certbot is defined
      tags: [certbot, deploy]

    - name: Login YC host to GHCR
      shell: |
        echo "{{ lookup('env', 'GITHUB_TOKEN') }}" | docker login ghcr.io -u "{{ lookup('env', 'GITHUB_ACTOR') }}" --password-stdin
      no_log: true
      tags: [deploy]

    - name: Pull and start YC containers
      shell: |
        set -e
        cd {{ app_dir }}
        docker compose pull
        docker compose up -d --force-recreate
        docker image prune -f
      register: yc_compose
      tags: [deploy]

    - name: Show YC compose output
      debug:
        var: yc_compose.stdout_lines
      when: yc_compose is defined
      tags: [deploy]

    - name: Show YC container status
      shell: |
        docker ps \
          --filter name=frontend \
          --filter name=backend \
          --filter name=postgres \
          --format 'table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}\t{{ "{{" }}.Ports{{ "}}" }}'
      register: yc_status
      changed_when: false
      tags: [status, deploy]

    - name: Print YC container status
      debug:
        var: yc_status.stdout_lines
      when: yc_status is defined
      tags: [status, deploy]

    - name: Show YC recent logs
      shell: |
        for service in backend frontend postgres; do
          echo "---- $service logs ----"
          docker logs "$service" --tail=30 2>&1 || true
        done
      register: yc_logs
      changed_when: false
      tags: [logs]

    - name: Print YC recent logs
      debug:
        var: yc_logs.stdout_lines
      when: yc_logs is defined
      tags: [logs]

    - name: Check YC backend health
      shell: |
        curl -fsS http://127.0.0.1:8000/health
      register: yc_health
      changed_when: false
      retries: 10
      delay: 3
      until: yc_health.rc == 0
      tags: [healthcheck, deploy]

    - name: Print YC backend health
      debug:
        var: yc_health.stdout_lines
      when: yc_health is defined
      tags: [healthcheck, deploy]

- name: Deploy VPS nodes (Hysteria)
  hosts: vps
  gather_facts: false
  vars:
    hysteria_auth: "{{ lookup('env', 'HYSTERIA_AUTH') }}"
    cf_api_token: "{{ lookup('env', 'CF_API_TOKEN') }}"
    email: "{{ lookup('env', 'EMAIL') }}"

  tasks:
    - name: Show VPS deployment target
      debug:
        msg: "VPS target={{ inventory_hostname }} host={{ ansible_host }} domain={{ vps_domain }}"
      tags: [always]

    - name: Create VPS directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}/hysteria"
        - "{{ secrets_dir }}"
      tags: [prepare, certbot, deploy]

    - name: Render VPS environment file
      template:
        src: templates/servers.env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"
      tags: [env, deploy]

    - name: Render VPS Hysteria config
      template:
        src: templates/hysteria.config.yaml.j2
        dest: "{{ app_dir }}/hysteria/config.yaml"
        mode: "0644"
      tags: [deploy]

    - name: Render VPS docker-compose.yaml
      template:
        src: templates/docker-compose.vps.yaml.j2
        dest: "{{ app_dir }}/docker-compose.yaml"
        mode: "0644"
      tags: [deploy]

    - name: Render VPS Cloudflare credentials
      template:
        src: templates/cloudflare.ini.j2
        dest: "{{ secrets_dir }}/cloudflare-vps.ini"
        mode: "0600"
      tags: [certbot, deploy]

    - name: Check Docker on VPS
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1; then
          docker --version
        else
          echo "docker_status=missing"
          exit 1
        fi
        systemctl is-active docker
      register: vps_docker
      changed_when: false
      tags: [prepare, status, deploy]

    - name: Print VPS Docker status
      debug:
        var: vps_docker.stdout_lines
      when: vps_docker is defined
      tags: [prepare, status, deploy]

    - name: Check or issue VPS certificate
      shell: |
        set -e
        CERT_PATH="/etc/letsencrypt/live/{{ vps_domain }}/fullchain.pem"
        RENEW=false

        if [ ! -f "$CERT_PATH" ]; then
          echo "certificate_status=missing"
          RENEW=true
        else
          EXPIRY="$(openssl x509 -enddate -noout -in "$CERT_PATH" | cut -d= -f2)"
          DAYS=$(( ($(date -d "$EXPIRY" +%s) - $(date +%s)) / 86400 ))
          echo "certificate_status=present"
          echo "certificate_days_left=$DAYS"
          [ "$DAYS" -lt 30 ] && RENEW=true
        fi

        if [ "$RENEW" = true ]; then
          echo "certificate_action=issue"
          apt-get update -qq
          apt-get install -y -qq certbot python3-certbot-dns-cloudflare
          certbot certonly \
            --dns-cloudflare \
            --dns-cloudflare-credentials {{ secrets_dir }}/cloudflare-vps.ini \
            -d {{ vps_domain }} \
            --email {{ email }} \
            --agree-tos --no-eff-email --non-interactive
        else
          echo "certificate_action=skip"
        fi
      register: vps_certbot
      changed_when: "'certificate_action=issue' in vps_certbot.stdout"
      tags: [certbot, deploy]

    - name: Show VPS certificate result
      debug:
        var: vps_certbot.stdout_lines
      when: vps_certbot is defined
      tags: [certbot, deploy]

    - name: Pull and start Hysteria
      shell: |
        set -e
        cd {{ app_dir }}
        docker compose pull hysteria
        docker compose rm -sf hysteria
        docker compose up -d hysteria
        docker image prune -f
      register: vps_compose
      tags: [deploy]

    - name: Show VPS compose output
      debug:
        var: vps_compose.stdout_lines
      when: vps_compose is defined
      tags: [deploy]

    - name: Show VPS container status
      shell: |
        docker ps \
          --filter name=hysteria \
          --format 'table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}\t{{ "{{" }}.Ports{{ "}}" }}'
      register: vps_status
      changed_when: false
      tags: [status, deploy]

    - name: Print VPS container status
      debug:
        var: vps_status.stdout_lines
      when: vps_status is defined
      tags: [status, deploy]

    - name: Show VPS recent logs
      shell: |
        docker logs hysteria --tail=30 2>&1 || true
      register: vps_logs
      changed_when: false
      tags: [logs]

    - name: Print VPS recent logs
      debug:
        var: vps_logs.stdout_lines
      when: vps_logs is defined
      tags: [logs]
