---
- name: Deploy CORE (frontend + backend + postgres)
  hosts: core
  gather_facts: false
  vars:
    # -------------------------------------------------------
    #  lookup('env', 'VAR_NAME') — читает переменную окружения
    #  с машины, ОТКУДА запускается Ansible (не с сервера!).
    #
    #  Зачем это нужно:
    #  Секреты (пароли, токены) нельзя хранить прямо в коде.
    #  Вместо этого они передаются через переменные окружения —
    #  либо вручную в терминале (export POSTGRES_PASSWORD=...),
    #  либо автоматически из GitHub Actions secrets.
    #
    #  Синтаксис:
    #    lookup('env', 'ИМЯ_ПЕРЕМЕННОЙ')
    #
    #  | default('значение', true) — если переменная окружения
    #  не задана или пустая, подставить значение по умолчанию.
    #  Второй аргумент "true" означает: считать пустую строку
    #  тоже "незаданной" (без него "" не заменяется дефолтом).
    #
    #  | lower — фильтр Jinja2, переводит строку в нижний регистр.
    #  Нужно для имён Docker-образов: GHCR требует lowercase.
    #
    #  Если default() не указан и переменная не задана —
    #  Ansible подставит пустую строку "". Для секретов это
    #  опасно, поэтому default() здесь намеренно не ставится:
    #  лучше упасть с ошибкой, чем задеплоить без пароля.
    # -------------------------------------------------------
    image_tag:         "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
    ghcr_owner:        "{{ lookup('env', 'GHCR_OWNER') | default('extekky', true) | lower }}"
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    jwt_secret:        "{{ lookup('env', 'JWT_SECRET') }}"
    hysteria_auth:     "{{ lookup('env', 'HYSTERIA_AUTH') }}"
    admin_username:    "{{ lookup('env', 'ADMIN_USERNAME') }}"
    admin_password:    "{{ lookup('env', 'ADMIN_PASSWORD') }}"
    cf_api_token:      "{{ lookup('env', 'CF_API_TOKEN') }}"
    email:             "{{ lookup('env', 'EMAIL') }}"
    # Для ghcr_username и ghcr_token — два уровня fallback:
    # сначала смотрим на кастомную переменную (GHCR_USERNAME / GHCR_TOKEN),
    # если не задана — берём стандартную переменную GitHub Actions
    # (GITHUB_ACTOR / GITHUB_TOKEN), которая проставляется автоматически
    ghcr_username:     "{{ lookup('env', 'GHCR_USERNAME') | default(lookup('env', 'GITHUB_ACTOR'), true) }}"
    ghcr_token:        "{{ lookup('env', 'GHCR_TOKEN') | default(lookup('env', 'GITHUB_TOKEN'), true) }}"
    certificate_domains:
      - "{{ service_domain }}"
      - "www.{{ service_domain }}"

  tasks:
    - name: Show CORE deployment target
      debug:
        msg: "Core target={{ inventory_hostname }} host={{ ansible_host }} image_tag={{ image_tag }}"
      tags: [always]

    - name: Check CORE required environment
      assert:
        that:
          - postgres_password | length > 0
          - jwt_secret | length >= 32
          - hysteria_auth | length > 0
          - admin_username | length > 0
          - admin_password | length > 0
          - cf_api_token | length > 0
          - email | length > 0
        # ">-" это YAML-синтаксис для записи длинных строк.
        # Расшифровка по символам:
        #   > сверни переносы строк в пробелы. То есть если ты пишешь текст на
        #     нескольких строках для читаемости, в итоге это будет одна строка
        #     с пробелами вместо переносов.
        #   - "убери финальный перенос строки \n в конце".
        fail_msg: >-
          Core deploy environment is incomplete. Export POSTGRES_PASSWORD,
          JWT_SECRET (at least 32 chars), HYSTERIA_AUTH, ADMIN_USERNAME,
          ADMIN_PASSWORD, CF_API_TOKEN, and EMAIL before running playbook.
      tags: [prepare, certbot, deploy]

    - name: Create CORE application directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ secrets_dir }}"
      tags: [prepare, certbot, deploy]

    - name: Create CORE Postgres data directory
      become: true
      file:
        path: "{{ data_dir }}/pgdata"
        state: directory
        mode: "0755"
      tags: [prepare, deploy]

    - name: Render CORE environment file
      template:
        src: templates/infra.env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"
      tags: [env, deploy]

    - name: Render CORE docker-compose.yaml
      template:
        src: templates/docker-compose.core.yaml.j2
        dest: "{{ app_dir }}/docker-compose.yaml"
        mode: "0644"
      tags: [deploy]

    - name: Render CORE Cloudflare credentials
      template:
        src: templates/cloudflare.ini.j2
        dest: "{{ secrets_dir }}/cloudflare-core.ini"
        mode: "0600"
      tags: [certbot, deploy]

    - name: Check Docker on CORE
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1; then
          docker --version
        else
          echo "docker_status=missing"
          exit 1
        fi
        systemctl is-active docker
      register: core_docker
      changed_when: false
      tags: [prepare, status, deploy]

    - name: Print CORE Docker status
      debug:
        var: core_docker.stdout_lines
      when: core_docker is defined
      tags: [prepare, status, deploy]

    - name: Check or issue CORE certificate
      become: true
      shell: |
        set -e
        CERT_PATH="/etc/letsencrypt/live/{{ service_domain }}/fullchain.pem"
        RENEW=false

        if [ ! -f "$CERT_PATH" ]; then
          echo "certificate_status=missing"
          RENEW=true
        else
          EXPIRY="$(openssl x509 -enddate -noout -in "$CERT_PATH" | cut -d= -f2)"
          DAYS=$(( ($(date -d "$EXPIRY" +%s) - $(date +%s)) / 86400 ))
          echo "certificate_status=present"
          echo "certificate_days_left=$DAYS"
          [ "$DAYS" -lt 30 ] && RENEW=true
        fi

        if [ "$RENEW" = true ]; then
          echo "certificate_action=issue"
          apt-get update -qq
          apt-get install -y -qq certbot python3-certbot-dns-cloudflare
          certbot certonly \
            --dns-cloudflare \
            --dns-cloudflare-credentials {{ secrets_dir }}/cloudflare-core.ini \
            {% for cert_domain in certificate_domains %}
            -d {{ cert_domain }} \
            {% endfor %}
            --email {{ email }} \
            --agree-tos --no-eff-email --non-interactive
        else
          echo "certificate_action=skip"
        fi
      register: core_certbot
      changed_when: "'certificate_action=issue' in core_certbot.stdout"
      tags: [certbot, deploy]

    - name: Show CORE certificate result
      debug:
        var: core_certbot.stdout_lines
      when: core_certbot is defined
      tags: [certbot, deploy]

    - name: Check GHCR credentials
      assert:
        that:
          - ghcr_username | length > 0
          - ghcr_token | length > 0
        fail_msg: >-
          GHCR credentials are missing. For local deploy export GHCR_USERNAME and
          GHCR_TOKEN, or GITHUB_ACTOR and GITHUB_TOKEN. GHCR_TOKEN must be a
          GitHub token with permission to read packages.
      tags: [deploy]

    - name: Login CORE host to GHCR
      shell: |
        printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u {{ ghcr_username | quote }} --password-stdin
      environment:
        GHCR_TOKEN: "{{ ghcr_token }}"
      no_log: true
      tags: [deploy]

    - name: Pull and start CORE containers
      shell: |
        set -e
        cd {{ app_dir }}
        docker compose pull
        docker compose up -d --force-recreate
        docker image prune -f
      register: core_compose
      tags: [deploy]

    - name: Show CORE compose output
      debug:
        var: core_compose.stdout_lines
      when: core_compose is defined
      tags: [deploy]

    - name: Show CORE container status
      shell: |
        docker ps \
          --filter name=frontend \
          --filter name=backend \
          --filter name=postgres \
          --format 'table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}\t{{ "{{" }}.Ports{{ "}}" }}'
      register: core_status
      changed_when: false
      tags: [status, deploy]

    - name: Print CORE container status
      debug:
        var: core_status.stdout_lines
      when: core_status is defined
      tags: [status, deploy]

    - name: Show CORE recent logs
      shell: |
        for service in backend frontend postgres; do
          echo "---- $service logs ----"
          docker logs "$service" --tail=30 2>&1 || true
        done
      register: core_logs
      changed_when: false
      tags: [logs]

    - name: Print CORE recent logs
      debug:
        var: core_logs.stdout_lines
      when: core_logs is defined
      tags: [logs]

    - name: Check CORE backend health
      shell: |
        curl -fsS http://127.0.0.1:8000/health
      register: core_health
      changed_when: false
      retries: 10
      delay: 3
      until: core_health.rc == 0
      tags: [healthcheck, deploy]

    - name: Print CORE backend health
      debug:
        var: core_health.stdout_lines
      when: core_health is defined
      tags: [healthcheck, deploy]

- name: Deploy NODES (Hysteria)
  hosts: nodes
  gather_facts: false
  vars:
    hysteria_auth: "{{ lookup('env', 'HYSTERIA_AUTH') }}"
    cf_api_token:  "{{ lookup('env', 'CF_API_TOKEN') }}"
    email:         "{{ lookup('env', 'EMAIL') }}"

  tasks:
    - name: Show NODE deployment target
      debug:
        msg: >-
          Node target={{ inventory_hostname }}
          host={{ ansible_host }}
          domain={{ vps_domain }}
          vpn_port={{ vpn_port }}
      tags: [always]

    - name: Create NODE directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ app_dir }}/hysteria"
        - "{{ secrets_dir }}"
      tags: [prepare, certbot, deploy]

    - name: Render NODE environment file
      template:
        src: templates/servers.env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"
      tags: [env, deploy]

    - name: Render NODE Hysteria config
      template:
        src: templates/hysteria.config.yaml.j2
        dest: "{{ app_dir }}/hysteria/config.yaml"
        mode: "0644"
      tags: [deploy]

    - name: Render NODE docker-compose.yaml
      template:
        src: templates/docker-compose.node.yaml.j2
        dest: "{{ app_dir }}/docker-compose.yaml"
        mode: "0644"
      tags: [deploy]

    - name: Render NODE Cloudflare credentials
      template:
        src: templates/cloudflare.ini.j2
        dest: "{{ secrets_dir }}/cloudflare-node.ini"
        mode: "0600"
      tags: [certbot, deploy]

    - name: Check Docker on NODE
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1; then
          docker --version
        else
          echo "docker_status=missing"
          exit 1
        fi
        systemctl is-active docker
      register: node_docker
      changed_when: false
      tags: [prepare, status, deploy]

    - name: Print NODE Docker status
      debug:
        var: node_docker.stdout_lines
      when: node_docker is defined
      tags: [prepare, status, deploy]

    - name: Check NODE VPN port availability
      shell: |
        set -e
        VPN_PORT="{{ vpn_port }}"
        echo "vpn_port=$VPN_PORT"

        if ! command -v ss >/dev/null 2>&1; then
          echo "vpn_port_check_status=missing_ss"
          exit 1
        fi

        if docker ps \
          --filter name='^/hysteria$' \
          --format '{{ "{{" }}.Ports{{ "}}" }}' \
          | grep -Eq "(0\.0\.0\.0|::):${VPN_PORT}->|:${VPN_PORT}->"; then
          echo "vpn_port_status=used_by_existing_hysteria"
          exit 0
        fi

        TCP_LISTENERS="$(ss -H -ltnp "sport = :${VPN_PORT}" 2>/dev/null || true)"
        UDP_LISTENERS="$(ss -H -lunp "sport = :${VPN_PORT}" 2>/dev/null || true)"

        if [ -z "$TCP_LISTENERS" ] && [ -z "$UDP_LISTENERS" ]; then
          echo "vpn_port_status=free"
          exit 0
        fi

        echo "vpn_port_status=busy"
        [ -n "$TCP_LISTENERS" ] && printf 'tcp_listeners:\n%s\n' "$TCP_LISTENERS"
        [ -n "$UDP_LISTENERS" ] && printf 'udp_listeners:\n%s\n' "$UDP_LISTENERS"
        exit 1
      register: node_vpn_port_check
      changed_when: false
      tags: [prepare, deploy]

    - name: Print NODE VPN port availability
      debug:
        var: node_vpn_port_check.stdout_lines
      when: node_vpn_port_check is defined
      tags: [prepare, deploy]

    - name: Check or issue NODE certificate
      shell: |
        set -e
        CERT_PATH="/etc/letsencrypt/live/{{ vps_domain }}/fullchain.pem"
        RENEW=false

        if [ ! -f "$CERT_PATH" ]; then
          echo "certificate_status=missing"
          RENEW=true
        else
          EXPIRY="$(openssl x509 -enddate -noout -in "$CERT_PATH" | cut -d= -f2)"
          DAYS=$(( ($(date -d "$EXPIRY" +%s) - $(date +%s)) / 86400 ))
          echo "certificate_status=present"
          echo "certificate_days_left=$DAYS"
          [ "$DAYS" -lt 30 ] && RENEW=true
        fi

        if [ "$RENEW" = true ]; then
          echo "certificate_action=issue"
          apt-get update -qq
          apt-get install -y -qq certbot python3-certbot-dns-cloudflare
          certbot certonly \
            --dns-cloudflare \
            --dns-cloudflare-credentials {{ secrets_dir }}/cloudflare-node.ini \
            -d {{ vps_domain }} \
            --email {{ email }} \
            --agree-tos --no-eff-email --non-interactive
        else
          echo "certificate_action=skip"
        fi
      register: node_certbot
      changed_when: "'certificate_action=issue' in node_certbot.stdout"
      tags: [certbot, deploy]

    - name: Show NODE certificate result
      debug:
        var: node_certbot.stdout_lines
      when: node_certbot is defined
      tags: [certbot, deploy]

    - name: Pull and start Hysteria
      shell: |
        set -e
        cd {{ app_dir }}
        docker compose pull hysteria
        docker compose rm -sf hysteria
        docker compose up -d hysteria
        docker image prune -f
      register: node_compose
      tags: [deploy]

    - name: Show NODE compose output
      debug:
        var: node_compose.stdout_lines
      when: node_compose is defined
      tags: [deploy]

    - name: Show NODE container status
      shell: |
        docker ps \
          --filter name=hysteria \
          --format 'table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}\t{{ "{{" }}.Ports{{ "}}" }}'
      register: node_status
      changed_when: false
      tags: [status, deploy]

    - name: Print NODE container status
      debug:
        var: node_status.stdout_lines
      when: node_status is defined
      tags: [status, deploy]

    - name: Show NODE recent logs
      shell: |
        docker logs hysteria --tail=30 2>&1 || true
      register: node_logs
      changed_when: false
      tags: [logs]

    - name: Print NODE recent logs
      debug:
        var: node_logs.stdout_lines
      when: node_logs is defined
      tags: [logs]
