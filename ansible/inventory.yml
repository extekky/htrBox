# ------------------------------------------------------
#  ANSIBLE INVENTORY FILE (inventory.yml)
#
#  КЛЮЧЕВЫЕ СЛОВА ANSIBLE:
#    all, vars, children, hosts, ansible_host,
#    ansible_user, ansible_ssh_private_key_file
# ------------------------------------------------------

# КЛЮЧЕВОЕ СЛОВО: all
# "all" — это корневая группа, в которую входят
# АБСОЛЮТНО ВСЕ серверы из этого файла.
# Всё, что написано внутри "all", применяется
# к каждому серверу без исключения.
all:

  # КЛЮЧЕВОЕ СЛОВО: vars
  # vars — блок, где задаются переменные, общие для всех
  # серверов группы. Переменные под "all.vars" доступны
  # на каждом сервере.
  vars:

    # КЛЮЧЕВОЕ СЛОВО: ansible_ssh_private_key_file
    # Встроенная переменная Ansible. Указывает путь к приватному
    # SSH-ключу, которым Ansible будет подключаться к серверам.
    ansible_ssh_private_key_file: ~/.ssh/deploy_key

    # КЛЮЧЕВОЕ СЛОВО: ansible_ssh_common_args
    # Встроенная переменная Ansible. Дополнительные аргументы,
    # которые будут переданы команде ssh при каждом подключении.
    #
    # -o StrictHostKeyChecking=no — отключает подтверждение при
    # первом подключении к новому серверу, что блокирует автоматизацию.
    # NOTE: в проде лучше использовать known_hosts вместо "no"
    ansible_ssh_common_args: -o StrictHostKeyChecking=no

    # Пользовательская переменная. Хранит основной домен проекта.
    # Можно использовать в плейбуках как {{ service_domain }},
    # например при выпуске SSL-сертификата.
    service_domain: stdoq.ru

  # КЛЮЧЕВОЕ СЛОВО: children
  # "children" — дочерние группы внутри текущей группы (all).
  # Здесь мы делим все серверы на две группы:
  #   core  — сервер (backend + frontend + db)
  #   nodes — vps'ки в разных странах
  # Можно запустить плейбук только для определённой группы.
  children:

    # -------------------------------------------------------
    #  ГРУППА: core (backend, frontend, db)
    # -------------------------------------------------------
    core:

      # КЛЮЧЕВОЕ СЛОВО: hosts
      # "hosts" — список конкретных серверов в этой группе.
      # Каждый сервер имеет уникальное имя (alias), по которому
      # Ansible его идентифицирует внутри плейбуков.
      hosts:

        # Имя-псевдоним сервера (придумываем сами, любое слово).
        master:
          # КЛЮЧЕВОЕ СЛОВО: ansible_host
          ansible_host: 2.27.120.122
          # КЛЮЧЕВОЕ СЛОВО: ansible_user
          ansible_user: root
          # Пользовательские переменные.
          app_dir: /home/root/htrBox
          data_dir: /home/root/htrBox-data
          secrets_dir: /home/root/.secrets

        # Имя-псевдоним сервера (придумываем сами, любое слово).
        slave:
          # КЛЮЧЕВОЕ СЛОВО: ansible_host
          ansible_host: 81.26.184.82
          # КЛЮЧЕВОЕ СЛОВО: ansible_user
          ansible_user: stas
          # Пользовательские переменные.
          app_dir: /home/stas/htrBox
          data_dir: /home/stas/htrBox-data
          secrets_dir: /home/stas/.secrets

    # -------------------------------------------------------
    #  ГРУППА: nodes (виртуальные серверы в разных странах)
    #  У всех одинаковые настройки подключения (vars),
    #  но разные IP и домены (задаются у каждого хоста).
    # -------------------------------------------------------
    nodes:

      # vars на уровне группы "nodes" — применяются только
      # к серверам этой группы, не затрагивая "core".
      vars:

        # На всех VPS подключаемся как root (типично для дешёвых VPS).
        # Это переопределит глобальный ansible_user, если бы он был задан.
        ansible_user: root
        app_dir: /root/htrBox
        secrets_dir: /root/.secrets
        vpn_port: 443

      # Список всех VPS-серверов. У каждого свой IP и домен,
      # но остальные параметры берутся из vars выше.
      hosts:

        vps_se:
          ansible_host: 193.25.216.190
          vps_domain: se.stdoq.ru

        vps_nl:
          ansible_host: 151.245.136.168
          vps_domain: nl.stdoq.ru

        vps_ge:
          ansible_host: 2.26.99.243
          vps_domain: ge.stdoq.ru

        vps_pl:
          ansible_host: 2.26.5.104
          vps_domain: pl.stdoq.ru
