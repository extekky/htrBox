server {
    listen 80;
    server_name stdoq.ru www.stdoq.ru grafana.stdoq.ru;

    # Для получения сертификата Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное редиректим на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name stdoq.ru www.stdoq.ru;

    ssl_certificate     /etc/letsencrypt/live/stdoq.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stdoq.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Блокируем доступ к .env и скрытым файлам
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ \.env {
        deny all;
        return 404;
    }

    # Проксируем API-запросы на бэкенд
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # Для SPA: если запрошенный ресурс не найден, отдаем index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name grafana.stdoq.ru;

    ssl_certificate     /etc/letsencrypt/live/stdoq.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stdoq.ru/privkey.pem;

    location / {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
