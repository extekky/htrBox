[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

# Show test names and results clearly
addopts =
    -v
    --tb=short
    --strict-markers

# Markers used in the test suite
markers =
    slow: marks tests as slow (deselect with -m "not slow")