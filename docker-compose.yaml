# ---------------------------------------------
#  Local development
#
#  Frontend: Vite dev server on :5173 (hot reload)
#  Backend:  FastAPI on :8000
#  Hysteria: self-signed certs (hysteria/certs/)
#
#  Proxy /api/ -> backend setup in vite.config.ts
# ---------------------------------------------

services:
    postgres:
        image: postgres:17-alpine
        container_name: postgres
        env_file:
            - .env
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - vpn_net
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 300s
            timeout: 5s
            retries: 5
            start_period: 10s

    backend:
        container_name: backend
        build:
            context: ./backend
            dockerfile: Dockerfile
        environment:
            # for logging in backend
            - DOCKER_ENV=true
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "8000:8000"
        env_file:
            - .env
        networks:
            - vpn_net

    frontend:
        container_name: frontend
        build:
            context: .
            dockerfile: frontend/Dockerfile
            target: dev
        ports:
            - "5173:5173"
        volumes:
            # для разработки, чтобы изменения в коде фронтенда сразу отражались в контейнере
            - ./frontend:/app/frontend
            - node_modules:/app/frontend/node_modules 
        depends_on:
            - backend
        networks:
            - vpn_net

    hysteria:
        image: tobyxdd/hysteria:v2.7.0
        container_name: hysteria
        env_file:
            - ./hysteria/.env
        volumes:
            - ./hysteria/config.yaml:/etc/hysteria/config.yaml:ro
            - ./hysteria/certs/server.crt:/etc/hysteria/certs/server.crt:ro
            - ./hysteria/certs/server.key:/etc/hysteria/certs/server.key:ro
        command: server -c /etc/hysteria/config.yaml --disable-update-check
        ports:
            - "443:443/udp"
            - "8080:8080"
        networks:
            - vpn_net

    prometheus:
        image: prom/prometheus:v2.55.1
        container_name: prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--web.enable-lifecycle"
        ports:
            - "127.0.0.1:9090:9090"
        volumes:
            - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./monitoring/rules:/etc/prometheus/rules:ro
            - prometheus_data:/prometheus
        depends_on:
            - alertmanager
        networks:
            - vpn_net

    alertmanager:
        image: prom/alertmanager:v0.27.0
        container_name: alertmanager
        command:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
        ports:
            - "127.0.0.1:9093:9093"
        volumes:
            - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
            - alertmanager_data:/alertmanager
        networks:
            - vpn_net

    grafana:
        image: grafana/grafana:12.0.2
        container_name: grafana
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
            - GF_USERS_ALLOW_SIGN_UP=false
        ports:
            - "127.0.0.1:3000:3000"
        volumes:
            - grafana_data:/var/lib/grafana
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            - prometheus
        networks:
            - vpn_net

networks:
    vpn_net:
        driver: bridge

volumes:
    pgdata:
    node_modules:
    prometheus_data:
    alertmanager_data:
    grafana_data:
