<!doctype html>
<!-- lang="en" — говорит браузеру и поисковикам что язык страницы английский. 
 Используется скринридерами для правильного произношения. -->
<html lang="en" class="dark">

<head>
  <!-- charset="UTF-8" — говорит браузеру в какой кодировке читать файл. 
     UTF-8 поддерживает все языки мира. Без этого кириллица, китайский, 
     эмодзи — всё превратится в кракозябры. -->
  <meta charset="UTF-8" />
  <!-- Иконка во вкладке браузера. href="/favicon.svg" — браузер сделает 
     отдельный HTTP запрос за этим файлом. -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Критически важная строка для мобильных устройств. Без неё мобильный браузер 
     притворяется что его экран 980px широкий (как десктоп) и уменьшает всё. 
     С ней — берёт реальную ширину экрана устройства. initial-scale=1.0 означает 
     без зума по умолчанию. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Описание страницы для поисковиков — это тот текст который показывается под 
     заголовком в результатах Google -->
  <meta name="description" content="htrBox — VPN Management Panel" />
  <!-- Текст во вкладке браузера и в результатах поиска. -->
  <title>htrBox</title>
  <!-- Говорит браузеру: "заранее установи TCP соединение с этим сервером, 
     ещё до того как он реально понадобится". Это оптимизация — когда придёт 
     время грузить шрифт, соединение уже будет готово.  -->
  <!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
</head>

<body>
  <!-- Пустой контейнер. React найдёт его через document.getElementById('root') в 
     main.tsx и вставит сюда всё приложение. До того как JS загрузится и выполнится — эта 
     div пустая, страница белая. -->
  <div id="root"></div>
  <!-- type="module" — два эффекта сразу. Первый: говорит браузеру что это ES module, 
     то есть внутри можно использовать import/export. Второй: скрипт загружается асинхронно 
     и не блокирует рендер HTML. Именно поэтому этот тег стоит в конце <body> — к моменту
     выполнения JS, div#root уже точно существует в DOM. 
     src="/src/main.tsx" — как мы разобрали раньше, этот запрос перехватывает Vite и трансформирует 
     TypeScript на лету.-->
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

<!-- <!doctype html> - это не тег, это объявление. Говорит браузеру: 
 "перед тобой HTML5". Без этого браузер переходит в так называемый 
 "quirks mode" — режим совместимости со старым вебом из 90-х, где 
 куча вещей работает по-другому. Всегда должна быть первой строкой. -->
