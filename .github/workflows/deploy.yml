# .github/workflows/deploy.yml
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Куда деплоить'
        type: choice
        options: [all, yc, vps, vps-se, vps-nl, vps-ge, vps-pl]
        default: all
      tags:
        description: 'Что делать на серверах'
        type: choice
        options: [all, prepare, certbot, deploy, status, logs, healthcheck]
        default: deploy
      verbosity:
        description: 'Уровень логов'
        type: choice
        options: [normal, verbose]
        default: normal
      skip_build:
        description: 'Пропустить сборку образов'
        type: boolean
        default: false
      image_tag:
        description: 'Тег образа при skip_build=true'
        required: false
        default: latest

permissions:
  contents: read
  packages: write

jobs:

  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.skip_build == 'false'

    # outputs джоба экспортирует переменную image_tag наружу, чтобы следующие 
    # джобы (например, deploy) могли знать, какой тег образа был собран. 
    # Значение берётся из шага tag.
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:

      # Клонирует репозиторий на раннер. Без этого Git-история и файлы недоступны.
      - uses: actions/checkout@v4

      - name: Установить тег образа (короткий SHA)
        id: tag
        # `git rev-parse` --short HEAD -> возвращает первые 7 символов текущего коммита.
        # Запись в $GITHUB_OUTPUT — стандартный способ передать значение из шага в другие
        # шаги и в outputs джобы.
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # GitHub Container Registry
      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # логин того, кто запустил workflow

          # автоматически создаётся GitHub для каждого запуска, не нужно хранить вручную. 
          # Права на push в GHCR включены по умолчанию.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Директория, которую Docker видит как build context
          file: ./backend/Dockerfile # Путь к Dockerfile относительно корня репозитория
          push: true # После сборки сразу пушит в registry
          tags: |
            ghcr.io/${{ github.repository_owner }}/htrbox-backend:${{ steps.tag.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/htrbox-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/htrbox-frontend:${{ steps.tag.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/htrbox-frontend:latest

  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Установить Ansible
        run: pip install ansible

      - name: Настроить SSH ключ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy
        env:
          BUILD_RESULT:      ${{ needs.build.result }}
          BUILT_IMAGE_TAG:   ${{ needs.build.outputs.image_tag }}
          INPUT_IMAGE_TAG:   ${{ github.event.inputs.image_tag || 'latest' }}
          INPUT_TARGET:      ${{ github.event.inputs.target || 'all' }}
          INPUT_TAGS:        ${{ github.event.inputs.tags || 'deploy' }}
          INPUT_VERBOSITY:   ${{ github.event.inputs.verbosity || 'normal' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET:        ${{ secrets.JWT_SECRET }}
          HYSTERIA_AUTH:     ${{ secrets.HYSTERIA_AUTH }}
          ADMIN_USERNAME:    ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD:    ${{ secrets.ADMIN_PASSWORD }}
          CF_API_TOKEN:      ${{ secrets.CF_API_TOKEN }}
          EMAIL:             ${{ secrets.EMAIL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR:      ${{ github.actor }}
          GHCR_OWNER:        ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          if [ "$BUILD_RESULT" = "success" ]; then
            IMAGE_TAG="$BUILT_IMAGE_TAG"
          else
            IMAGE_TAG="${INPUT_IMAGE_TAG:-latest}"
          fi
          export IMAGE_TAG

          VERBOSITY=""
          if [ "$INPUT_VERBOSITY" = "verbose" ]; then
            VERBOSITY="-vvv"
          fi

          TAGS=""
          if [ "$INPUT_TAGS" != "all" ]; then
            TAGS="--tags $INPUT_TAGS"
          fi

          LIMIT=""
          case "$INPUT_TARGET" in
            all) LIMIT="" ;;
            yc) LIMIT="--limit yc" ;;
            vps) LIMIT="--limit vps" ;;
            vps-se) LIMIT="--limit vps_se" ;;
            vps-nl) LIMIT="--limit vps_nl" ;;
            vps-ge) LIMIT="--limit vps_ge" ;;
            vps-pl) LIMIT="--limit vps_pl" ;;
            *) echo "Unknown target: $INPUT_TARGET"; exit 1 ;;
          esac

          echo "Deploy target: $INPUT_TARGET"
          echo "Deploy tags: $INPUT_TAGS"
          echo "Deploy image tag: $IMAGE_TAG"
          echo "Deploy verbosity: $INPUT_VERBOSITY"

          ansible-playbook ansible/deploy.yml \
            -i ansible/inventory.yml \
            --private-key ~/.ssh/deploy_key \
            $VERBOSITY $TAGS $LIMIT
