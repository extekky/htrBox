# .github/workflows/deploy.yml
name: Build & Deploy

on:
  push:
    branches: [main]

jobs:

  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Установить тег образа (короткий SHA)
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/htrbox-backend:${{ steps.tag.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/htrbox-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./frontend/Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/htrbox-frontend:${{ steps.tag.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/htrbox-frontend:latest

  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Установить Ansible
        run: pip install ansible

      - name: Настроить SSH ключ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy YC
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          YC_HOST: ${{ secrets.YC_HOST }}
          YC_USER: ${{ secrets.YC_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          HYSTERIA_AUTH: ${{ secrets.HYSTERIA_AUTH }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_EMAIL: ${{ secrets.CF_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ansible-playbook ansible/deploy_yc.yml \
            -i ansible/inventory.ini \
            --private-key ~/.ssh/deploy_key

      - name: Deploy VPS nodes
        env:
          VPS_HOST_SE: ${{ secrets.VPS_HOST_SE }}
          VPS_HOST_NL: ${{ secrets.VPS_HOST_NL }}
          VPS_HOST_GE: ${{ secrets.VPS_HOST_GE }}
          VPS_HOST_PL: ${{ secrets.VPS_HOST_PL }}
          HYSTERIA_AUTH: ${{ secrets.HYSTERIA_AUTH }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_EMAIL: ${{ secrets.CF_EMAIL }}
        run: |
          ansible-playbook ansible/deploy_vps.yml \
            -i ansible/inventory.ini \
            --private-key ~/.ssh/deploy_key